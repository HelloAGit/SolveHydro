name: Docs
on: [pull_request, push]
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: python-version: 3.11
      - name: Install docs deps
        run: pip install mkdocs mkdocs-material
      - name: Build docs
        run: mkdocs build
